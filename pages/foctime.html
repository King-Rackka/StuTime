<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUTime - FocTime!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden; /* no scroll sama sekali */
    }
    .font-bebas { 
      font-family: 'Bebas Neue', sans-serif; 
    }
    .nav-blur { backdrop-filter: blur(20px); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .log-slide { animation: slideIn 0.3s ease; }
    .log-scroll::-webkit-scrollbar { width: 4px; }
    .log-scroll::-webkit-scrollbar-track { background: transparent; }
    .log-scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>

<body class="bg-[#111111] text-[#F0F0F0] h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="nav-blur flex-shrink-0 z-50 flex items-center px-10 py-[18px] border-b border-white/[0.07] bg-[#111111]/90">
    <div class="font-bebas w-10 h-10 rounded-full bg-[#FFD04E] text-[#111111] flex items-center justify-center text-lg flex-shrink-0">D</div>
    <div class="flex gap-1 bg-[#222222] rounded-full p-[5px] mx-auto border border-white/[0.07]">
      <a href="#" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Dashboard</a>
      <a href="noto.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Noto</a>
      <a href="task.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Task</a>
      <a href="foctime.html" class="px-5 py-2 rounded-full text-sm font-bold bg-[#FFD04E] text-[#111111]">FocTime!</a>
      <a href="calender.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Calendar</a>
    </div>
    <button onclick="openMotivate()" class="border border-[#FFD04E] text-[#FFD04E] px-5 py-[9px] rounded-full text-sm font-semibold hover:bg-[#FFD04E] hover:text-[#111111] transition-all">Motivate</button>
  </nav>

  <!-- Content area: fixed height = sisa setelah navbar -->
  <div class="flex-1 grid grid-cols-[400px_1fr] overflow-hidden">

    <!-- Sidebar -->
    <aside class="border-r border-white/[0.07] bg-[#1a1a1a] p-7 flex flex-col gap-6 overflow-hidden">
      <!-- Custom settings -->
      <div class="bg-[#222222] border border-white/[0.07] rounded-2xl p-6">
        <div class="font-bebas text-[#FFD04E] text-xl tracking-wider mb-5">Custom</div>
        <div class="flex items-center justify-between py-[10px] border-b border-white/[0.07]">
          <span class="text-sm font-medium text-[#ccc]">Focus</span>
          <div class="flex items-center gap-3">
            <button onclick="adjustTime('focus',-1)" class="w-7 h-7 bg-[#2a2a2a] border border-white/[0.07] rounded-lg text-[#FFD04E] font-bold flex items-center justify-center hover:bg-[#FFD04E]/10 hover:border-[#FFD04E] transition-all active:scale-90">−</button>
            <span class="font-bebas text-[22px] min-w-[28px] text-center" id="val-focus">25</span>
            <button onclick="adjustTime('focus',1)" class="w-7 h-7 bg-[#2a2a2a] border border-white/[0.07] rounded-lg text-[#FFD04E] font-bold flex items-center justify-center hover:bg-[#FFD04E]/10 hover:border-[#FFD04E] transition-all active:scale-90">+</button>
          </div>
        </div>
        <div class="flex items-center justify-between py-[10px] border-b border-white/[0.07]">
          <span class="text-sm font-medium text-[#ccc]">Short break</span>
          <div class="flex items-center gap-3">
            <button onclick="adjustTime('short',-1)" class="w-7 h-7 bg-[#2a2a2a] border border-white/[0.07] rounded-lg text-[#FFD04E] font-bold flex items-center justify-center hover:bg-[#FFD04E]/10 hover:border-[#FFD04E] transition-all active:scale-90">−</button>
            <span class="font-bebas text-[22px] min-w-[28px] text-center" id="val-short">5</span>
            <button onclick="adjustTime('short',1)" class="w-7 h-7 bg-[#2a2a2a] border border-white/[0.07] rounded-lg text-[#FFD04E] font-bold flex items-center justify-center hover:bg-[#FFD04E]/10 hover:border-[#FFD04E] transition-all active:scale-90">+</button>
          </div>
        </div>
        <div class="flex items-center justify-between py-[10px]">
          <span class="text-sm font-medium text-[#ccc]">Long break</span>
          <div class="flex items-center gap-3">
            <button onclick="adjustTime('long',-1)" class="w-7 h-7 bg-[#2a2a2a] border border-white/[0.07] rounded-lg text-[#FFD04E] font-bold flex items-center justify-center hover:bg-[#FFD04E]/10 hover:border-[#FFD04E] transition-all active:scale-90">−</button>
            <span class="font-bebas text-[22px] min-w-[28px] text-center" id="val-long">10</span>
            <button onclick="adjustTime('long',1)" class="w-7 h-7 bg-[#2a2a2a] border border-white/[0.07] rounded-lg text-[#FFD04E] font-bold flex items-center justify-center hover:bg-[#FFD04E]/10 hover:border-[#FFD04E] transition-all active:scale-90">+</button>
          </div>
        </div>
        <button onclick="applySettings()" class="w-full mt-[18px] bg-[#FFD04E] text-[#111111] rounded-xl py-3 text-sm font-bold hover:bg-[#ffe033] hover:-translate-y-px hover:shadow-[0_4px_20px_rgba(255,208,78,0.35)] active:translate-y-0 transition-all">Apply Settings</button>
      </div>

      <!-- FocStats -->
      <div class="bg-[#222222] border border-white/[0.07] rounded-2xl p-6">
        <div class="font-bebas text-[#FFD04E] text-xl tracking-wider mb-4">FocStats</div>
        <div class="grid grid-cols-2 gap-3">
          <div class="bg-[#2a2a2a] border border-white/[0.07] rounded-xl p-3 text-center">
            <div class="font-bebas text-[32px] text-[#FFD04E] leading-none" id="stat-sessions">0</div>
            <div class="text-[11px] text-[#888] mt-1 font-medium uppercase tracking-wide">Sessions</div>
          </div>
          <div class="bg-[#2a2a2a] border border-white/[0.07] rounded-xl p-3 text-center">
            <div class="font-bebas text-[32px] text-[#FFD04E] leading-none" id="stat-minutes">0</div>
            <div class="text-[11px] text-[#888] mt-1 font-medium uppercase tracking-wide">Min Focus</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main timer area -->
    <main class="flex flex-col items-center justify-center px-6 pb-6 relative overflow-hidden">

      <!-- Mode tabs — style berbeda dari navbar: kotak dengan border, bukan pill -->
      <div class="flex gap-2 mb-12">
        <button onclick="setMode('focus',this)" id="tab-focus"
          class="mode-tab px-6 py-2 rounded-xl text-sm font-bold bg-[#FFD04E] text-[#111111] border border-[#FFD04E] hover:bg-[#ffe033] hover:-translate-y-0.5 hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)] active:translate-y-0 transition-all">
          Focus
        </button>
        <button onclick="setMode('short',this)" id="tab-short"
          class="mode-tab px-6 py-2 rounded-xl text-sm font-semibold text-white border border-white/[0.07] hover:border-[#FFD04E] hover:text-[#FFD04E] hover:-translate-y-0.5 hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)] active:translate-y-0 transition-all">
          Short Break
        </button>
        <button onclick="setMode('long',this)" id="tab-long"
          class="mode-tab px-6 py-2 rounded-xl text-sm font-semibold text-white border border-white/[0.07] hover:border-[#FFD04E] hover:text-[#FFD04E] hover:-translate-y-0.5 hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)] active:translate-y-0 transition-all">
          Long Break
        </button>
      </div>

      <!-- Timer -->
      <div class="flex flex-col items-center mb-12">
        <div class="font-bebas leading-none tracking-wider" style="font-size: clamp(80px, 12vw, 140px);">
          <span id="timer-mm">25</span><span class="text-white">.</span><span id="timer-ss">00</span><span id="timer-ms" class="font-bebas text-white" style="font-size: clamp(40px, 6vw, 70px);">.00</span>
        </div>
        <div class="text-[15px] font-bold text-white tracking-[3px] uppercase mt-5" id="timer-status">Time to Focus!</div>
      </div>

      <!-- Buttons -->
      <div class="flex items-center gap-4">
        <button onclick="resetTimer()" class="flex items-center gap-2 px-20 py-[14px] rounded-xl text-[15px] font-semibold text-[#FFD04E] border border-[#FFD04E]/50 hover:border-[#FFD04E] hover:bg-[#FFD04E]/10 transition-all">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
          Reset
        </button>
        <button onclick="toggleTimer()" id="start-btn" class="flex items-center justify-center gap-2 px-20 py-[14px] rounded-xl text-[16px] font-bold min-w-[160px] bg-[#FFD04E] text-[#111111] hover:bg-[#ffe033] hover:-translate-y-0.5 hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)] active:translate-y-0 transition-all">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor" id="start-icon"><polygon points="10,8 18,12 10,16"/></svg>
          <span id="start-text">Start</span>
        </button>
        <button onclick="skipTimer()" class="flex items-center gap-2 px-20 py-[14px] rounded-xl text-[15px] font-semibold text-[#FFD04E] border border-[#FFD04E]/50 hover:border-[#FFD04E] hover:bg-[#FFD04E]/10 transition-all">
          Skip
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5,4 15,12 5,20"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <!-- Motivate Modal -->
  <div id="modal" onclick="closeMotivate(event)" class="fixed inset-0 bg-black/75 flex items-center justify-center z-[200] opacity-0 pointer-events-none transition-opacity duration-200" style="backdrop-filter:blur(8px)">
    <div id="modal-box" class="bg-[#1a1a1a] border border-white/[0.07] rounded-2xl p-10 max-w-[440px] w-[90%] text-center scale-95 transition-transform duration-200">
      <div class="text-5xl mb-4" id="modal-emoji">💪</div>
      <div class="text-lg leading-relaxed text-[#ddd] font-medium mb-2" id="modal-quote"></div>
      <div class="text-sm text-[#888] mb-7" id="modal-author"></div>
      <button onclick="closeMotivate()" class="bg-[#FFD04E] text-[#111111] px-8 py-3 rounded-xl font-bold text-sm">Let's Go! 🚀</button>
    </div>
  </div>

  <script>
    const settings = { focus: 25, short: 5, long: 10 };
    let currentMode = 'focus';
    let totalSeconds = 25 * 60;
    let remainingSeconds = totalSeconds;
    let remainingMs = 0;
    let running = false;
    let intervalId = null;
    let startTime = null;
    let stats = { sessions: 0, minutes: 0 };

    function adjustTime(key, delta) {
      settings[key] = Math.max(1, Math.min(90, settings[key] + delta));
      document.getElementById('val-' + key).textContent = settings[key];
    }
    function applySettings() {
      if (running) return;
      totalSeconds = settings[currentMode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      updateDisplay();
    }
    function setMode(mode, btn) {
      if (running) return;
      currentMode = mode;
      document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.remove('bg-[#FFD04E]', 'text-[#111111]', 'font-bold', 'border-[#FFD04E]', 'hover:bg-[#ffe033]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)]');
        t.classList.add('text-white', 'font-semibold', 'border-white/[0.07]', 'hover:border-[#FFD04E]', 'hover:text-[#FFD04E]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)]');
      });
      btn.classList.remove('text-white', 'font-semibold', 'border-white/[0.07]', 'hover:border-[#FFD04E]', 'hover:text-[#FFD04E]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)]');
      btn.classList.add('bg-[#FFD04E]', 'text-[#111111]', 'font-bold', 'border-[#FFD04E]', 'hover:bg-[#ffe033]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)]');
      totalSeconds = settings[mode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      const statuses = { focus:'Time to Focus!', short:'Short Break 🌿', long:'Long Break ☕' };
      document.getElementById('timer-status').textContent = statuses[mode];
      updateDisplay();
    }
    function toggleTimer() { running ? pauseTimer() : startTimer(); }
    function startTimer() {
      running = true;
      document.getElementById('start-text').textContent = 'Pause';
      document.getElementById('start-icon').innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
      const leftMs = remainingSeconds * 1000 + remainingMs * 10;
      startTime = Date.now() - (totalSeconds * 1000 - leftMs);
      intervalId = setInterval(() => {
        const left = Math.max(0, totalSeconds * 1000 - (Date.now() - startTime));
        remainingSeconds = Math.floor(left / 1000);
        remainingMs = Math.floor((left % 1000) / 10);
        updateDisplay();
        if (left <= 0) completeTimer();
      }, 50);
    }
    function pauseTimer() {
      running = false; clearInterval(intervalId);
      document.getElementById('start-text').textContent = 'Resume';
      document.getElementById('start-icon').innerHTML = '<polygon points="10,8 18,12 10,16"/>';
    }
    function resetTimer() {
      running = false; clearInterval(intervalId);
      totalSeconds = settings[currentMode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      document.getElementById('start-text').textContent = 'Start';
      document.getElementById('start-icon').innerHTML = '<polygon points="10,8 18,12 10,16"/>';
      const statuses = { focus:'Time to Focus!', short:'Short Break 🌿', long:'Long Break ☕' };
      document.getElementById('timer-status').textContent = statuses[currentMode];
      updateDisplay();
    }
    function skipTimer() { resetTimer(); }
    function completeTimer() {
      running = false; clearInterval(intervalId);
      document.getElementById('start-text').textContent = 'Start';
      document.getElementById('start-icon').innerHTML = '<polygon points="10,8 18,12 10,16"/>';
      document.getElementById('timer-status').textContent = currentMode === 'focus' ? '✅ Session Complete!' : '✅ Break Done!';
      if (currentMode === 'focus') {
        stats.sessions++; stats.minutes += settings.focus;
        updateStats();
      }
      try {
        const ctx = new AudioContext(), osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
        osc.start(); osc.stop(ctx.currentTime + 1);
      } catch(e) {}
    }
    function updateDisplay() {
      document.getElementById('timer-mm').textContent = String(Math.floor(remainingSeconds/60)).padStart(2,'0');
      document.getElementById('timer-ss').textContent = String(remainingSeconds%60).padStart(2,'0');
      document.getElementById('timer-ms').textContent = '.' + String(remainingMs).padStart(2,'0');
    }
    function updateStats() {
      document.getElementById('stat-sessions').textContent = stats.sessions;
      document.getElementById('stat-minutes').textContent = stats.minutes;
    }

    const quotes = [
      { emoji:'💪', quote:'"The secret of getting ahead is getting started."', author:'— Mark Twain' },
      { emoji:'🔥', quote:'"Focus on being productive instead of busy."', author:'— Tim Ferriss' },
      { emoji:'🎯', quote:'"Do the hard jobs first. The easy jobs will take care of themselves."', author:'— Dale Carnegie' },
      { emoji:'⚡', quote:'"You don\'t have to be great to start, but you have to start to be great."', author:'— Zig Ziglar' },
      { emoji:'🌟', quote:'"The way to get started is to quit talking and begin doing."', author:'— Walt Disney' },
      { emoji:'🧠', quote:'"It always seems impossible until it is done."', author:'— Nelson Mandela' },
    ];
    function openMotivate() {
      const q = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('modal-emoji').textContent = q.emoji;
      document.getElementById('modal-quote').textContent = q.quote;
      document.getElementById('modal-author').textContent = q.author;
      const m = document.getElementById('modal');
      m.classList.remove('opacity-0','pointer-events-none');
      m.classList.add('opacity-100');
      document.getElementById('modal-box').classList.remove('scale-95');
      document.getElementById('modal-box').classList.add('scale-100');
    }
    function closeMotivate(e) {
      if (!e || e.target === document.getElementById('modal')) {
        const m = document.getElementById('modal');
        m.classList.add('opacity-0','pointer-events-none');
        m.classList.remove('opacity-100');
        document.getElementById('modal-box').classList.add('scale-95');
        document.getElementById('modal-box').classList.remove('scale-100');
      }
    }
    updateDisplay();
  </script>
</body>
</html>
