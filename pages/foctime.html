    </div>

  <script>
    // ─── SETTINGS ───
    const settings = { focus: 25, short: 5, long: 10 };
    let currentMode = 'focus';
    let totalSeconds = 25 * 60;
    let remainingSeconds = totalSeconds;
    let remainingMs = 0;
    let running = false;
    let intervalId = null;
    let startTime = null;
    let focusCount = 0; // counter sesi focus untuk trigger long break (setiap 4x)

    // ─── STATS (localStorage) ───
    function getTodayStr() {
      const n = new Date();
      return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0');
    }
    function loadStats() {
      const today = getTodayStr();
      const raw = localStorage.getItem('stutime_focstats');
      const data = raw ? JSON.parse(raw) : {};
      // Sessions today
      const sessionsToday = data.date === today ? (data.sessions || 0) : 0;
      // Streak
      const yesterday = (() => {
        const d = new Date(); d.setDate(d.getDate()-1);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      })();
      let streak = data.streak || 0;
      // Jika data bukan hari ini dan bukan kemarin, reset streak
      if (data.lastActive && data.lastActive !== today && data.lastActive !== yesterday) {
        streak = 0;
      }
      return { sessions: sessionsToday, streak, lastActive: data.lastActive || null, allData: data };
    }
    function saveStats(sessions, streak) {
      const today = getTodayStr();
      localStorage.setItem('stutime_focstats', JSON.stringify({
        date: today, sessions, streak, lastActive: today
      }));
    }
    function addSession() {
      const s = loadStats();
      const newSessions = s.sessions + 1;
      // Streak: jika lastActive bukan hari ini, berarti hari baru → +1 streak
      const today = getTodayStr();
      let newStreak = s.streak;
      if (s.lastActive !== today) {
        newStreak = s.streak + 1;
      }
      saveStats(newSessions, newStreak);
      updateStats();
    }
    function updateStats() {
      const s = loadStats();
      document.getElementById('stat-sessions').textContent = s.sessions;
      document.getElementById('stat-minutes').textContent = s.streak;
      // Sync mobile juga
      const sm = document.getElementById('stat-sessions-m');
      const mm = document.getElementById('stat-minutes-m');
      if (sm) sm.textContent = s.sessions;
      if (mm) mm.textContent = s.streak;
    }

    // ─── SOUND (dering lonceng) ───
    function playBell() {
      try {
        const audio = new Audio('../src/audio/alarm.mp3');
        audio.volume = 0.8;
        audio.play();
        // Stop otomatis setelah 4 detik
        setTimeout(() => {
          audio.pause();
          audio.currentTime = 0;
        }, 4000);
      } catch(e) {}
    }

    // ─── SWITCH MODE (auto/manual) ───
    function switchToMode(mode) {
      currentMode = mode;
      // Update tab UI
      const tabMap = { focus: 'tab-focus', short: 'tab-short', long: 'tab-long' };
      document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.remove('bg-[#FFD04E]', 'text-[#111111]', 'font-bold', 'border-[#FFD04E]', 'hover:bg-[#ffe033]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)]');
        t.classList.add('text-white', 'font-semibold', 'border-white/[0.07]', 'hover:border-[#FFD04E]', 'hover:text-[#FFD04E]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)]');
      });
      const activeTab = document.getElementById(tabMap[mode]);
      activeTab.classList.remove('text-white', 'font-semibold', 'border-white/[0.07]', 'hover:border-[#FFD04E]', 'hover:text-[#FFD04E]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)]');
      activeTab.classList.add('bg-[#FFD04E]', 'text-[#111111]', 'font-bold', 'border-[#FFD04E]', 'hover:bg-[#ffe033]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)]');
      // Reset timer untuk mode baru
      totalSeconds = settings[mode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      const statuses = { focus: 'Time to Focus!', short: 'Short Break 🌿', long: 'Long Break ☕' };
      document.getElementById('timer-status').textContent = statuses[mode];
      document.getElementById('start-text').textContent = 'Start';
      document.getElementById('start-icon').innerHTML = '<polygon points="10,8 18,12 10,16"/>';
      updateDisplay();
    }

    // ─── NEXT MODE (Pomodoro cycle) ───
    function getNextMode() {
      if (currentMode === 'focus') {
        // Setiap 4 sesi focus → long break, sisanya short break
        return focusCount % 4 === 0 ? 'long' : 'short';
      } else {
        // Setelah break → balik focus
        return 'focus';
      }
    }

    // ─── CONTROLS ───
    function adjustTime(key, delta) {
      settings[key] = Math.max(1, Math.min(90, settings[key] + delta));
      // Sync semua display (sidebar desktop + modal mobile)
      const v = settings[key];
      const el1 = document.getElementById('val-' + key);
      const el2 = document.getElementById('val-' + key + '-m');
      if (el1) el1.textContent = v;
      if (el2) el2.textContent = v;
    }
    function openSettings() {
      updateStatsMobile();
      const m = document.getElementById('settings-modal');
      const b = document.getElementById('settings-box');
      m.classList.remove('opacity-0','pointer-events-none');
      m.classList.add('opacity-100');
      b.classList.remove('translate-y-4');
      b.classList.add('translate-y-0');
    }
    function closeSettings() {
      const m = document.getElementById('settings-modal');
      const b = document.getElementById('settings-box');
      m.classList.add('opacity-0','pointer-events-none');
      m.classList.remove('opacity-100');
      b.classList.add('translate-y-4');
      b.classList.remove('translate-y-0');
    }
    function updateStatsMobile() {
      const s = loadStats();
      const sm = document.getElementById('stat-sessions-m');
      const mm = document.getElementById('stat-minutes-m');
      if (sm) sm.textContent = s.sessions;
      if (mm) mm.textContent = s.streak;
    }
    function applySettings() {
      if (running) return;
      totalSeconds = settings[currentMode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      updateDisplay();
    }
    function setMode(mode, btn) {
      if (running) return;
      currentMode = mode;
      document.querySelectorAll('.mode-tab').forEach(t => {
        t.classList.remove('bg-[#FFD04E]', 'text-[#111111]', 'font-bold', 'border-[#FFD04E]', 'hover:bg-[#ffe033]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)]');
        t.classList.add('text-white', 'font-semibold', 'border-white/[0.07]', 'hover:border-[#FFD04E]', 'hover:text-[#FFD04E]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)]');
      });
      btn.classList.remove('text-white', 'font-semibold', 'border-white/[0.07]', 'hover:border-[#FFD04E]', 'hover:text-[#FFD04E]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.15)]');
      btn.classList.add('bg-[#FFD04E]', 'text-[#111111]', 'font-bold', 'border-[#FFD04E]', 'hover:bg-[#ffe033]', 'hover:shadow-[0_6px_24px_rgba(255,208,78,0.35)]');
      totalSeconds = settings[mode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      const statuses = { focus:'Time to Focus!', short:'Short Break 🌿', long:'Long Break ☕' };
      document.getElementById('timer-status').textContent = statuses[mode];
      updateDisplay();
    }
    function toggleTimer() { running ? pauseTimer() : startTimer(); }
    function startTimer() {
      running = true;
      document.getElementById('start-text').textContent = 'Pause';
      document.getElementById('start-icon').innerHTML = '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';
      const leftMs = remainingSeconds * 1000 + remainingMs * 10;
      startTime = Date.now() - (totalSeconds * 1000 - leftMs);
      intervalId = setInterval(() => {
        const left = Math.max(0, totalSeconds * 1000 - (Date.now() - startTime));
        remainingSeconds = Math.floor(left / 1000);
        remainingMs = Math.floor((left % 1000) / 10);
        updateDisplay();
        if (left <= 0) completeTimer();
      }, 50);
    }
    function pauseTimer() {
      running = false; clearInterval(intervalId);
      document.getElementById('start-text').textContent = 'Resume';
      document.getElementById('start-icon').innerHTML = '<polygon points="10,8 18,12 10,16"/>';
    }
    function resetTimer() {
      running = false; clearInterval(intervalId);
      totalSeconds = settings[currentMode] * 60;
      remainingSeconds = totalSeconds; remainingMs = 0;
      document.getElementById('start-text').textContent = 'Start';
      document.getElementById('start-icon').innerHTML = '<polygon points="10,8 18,12 10,16"/>';
      const statuses = { focus:'Time to Focus!', short:'Short Break 🌿', long:'Long Break ☕' };
      document.getElementById('timer-status').textContent = statuses[currentMode];
      updateDisplay();
    }

    // Skip = pindah ke mode berikutnya tanpa hitung sesi
    function skipTimer() {
      running = false; clearInterval(intervalId);
      const next = getNextMode();
      if (currentMode === 'focus') focusCount++; // tetap nambah counter tapi tidak nambah stats
      switchToMode(next);
    }

    // Complete = timer habis sendiri, hitung sesi + bunyi + auto-switch
    function completeTimer() {
      running = false; clearInterval(intervalId);
      playBell();
      if (currentMode === 'focus') {
        focusCount++;
        addSession(); // tambah stats
        document.getElementById('timer-status').textContent = '✅ Session Complete!';
      } else {
        document.getElementById('timer-status').textContent = '✅ Break Done!';
      }
      // Auto-switch ke mode berikutnya setelah 1.5 detik, tunggu user klik Start
      setTimeout(() => {
        const next = getNextMode();
        switchToMode(next);
        // TIDAK auto-start, user harus klik Start sendiri
      }, 1500);
    }

    function openHamburger() {
      const d = document.getElementById('hamburger-drawer');
      const b = document.getElementById('hamburger-box');
      d.classList.remove('opacity-0','pointer-events-none');
      d.classList.add('opacity-100');
      b.classList.remove('-translate-x-full');
      b.classList.add('translate-x-0');
    }
    function closeHamburger() {
      const d = document.getElementById('hamburger-drawer');
      const b = document.getElementById('hamburger-box');
      d.classList.add('opacity-0','pointer-events-none');
      d.classList.remove('opacity-100');
      b.classList.add('-translate-x-full');
      b.classList.remove('translate-x-0');
    }

    function updateDisplay() {
      document.getElementById('timer-mm').textContent = String(Math.floor(remainingSeconds/60)).padStart(2,'0');
      document.getElementById('timer-ss').textContent = String(remainingSeconds%60).padStart(2,'0');
      document.getElementById('timer-ms').textContent = '.' + String(remainingMs).padStart(2,'0');
    }

    // ─── MOTIVATE ───
    const quotes = [
      { emoji:'💪', quote:'"The secret of getting ahead is getting started."', author:'— Mark Twain' },
      { emoji:'🔥', quote:'"Focus on being productive instead of busy."', author:'— Tim Ferriss' },
      { emoji:'🎯', quote:'"Do the hard jobs first. The easy jobs will take care of themselves."', author:'— Dale Carnegie' },
      { emoji:'⚡', quote:'"You don\'t have to be great to start, but you have to start to be great."', author:'— Zig Ziglar' },
      { emoji:'🌟', quote:'"The way to get started is to quit talking and begin doing."', author:'— Walt Disney' },
      { emoji:'🧠', quote:'"It always seems impossible until it is done."', author:'— Nelson Mandela' },
    ];
    function openMotivate() {
      const q = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('modal-emoji').textContent = q.emoji;
      document.getElementById('modal-quote').textContent = q.quote;
      document.getElementById('modal-author').textContent = q.author;
      const m = document.getElementById('modal');
      m.classList.remove('opacity-0','pointer-events-none');
      m.classList.add('opacity-100');
      document.getElementById('modal-box').classList.remove('scale-95');
      document.getElementById('modal-box').classList.add('scale-100');
    }
    function closeMotivate(e) {
      if (!e || e.target === document.getElementById('modal')) {
        const m = document.getElementById('modal');
        m.classList.add('opacity-0','pointer-events-none');
        m.classList.remove('opacity-100');
        document.getElementById('modal-box').classList.add('scale-95');
        document.getElementById('modal-box').classList.remove('scale-100');
      }
    }

    // ─── INIT ───
    updateDisplay();
    updateStats();
  </script>
</body>
</html>
