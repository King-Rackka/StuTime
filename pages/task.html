<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STUTime - Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-bebas { font-family: 'Bebas Neue', sans-serif; }
    .nav-blur { backdrop-filter: blur(20px); }

    .task-scroll::-webkit-scrollbar { width: 4px; }
    .task-scroll::-webkit-scrollbar-track { background: transparent; }
    .task-scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* Scrollbar horizontal untuk pinned bar */
    .pin-scroll::-webkit-scrollbar { height: 3px; }
    .pin-scroll::-webkit-scrollbar-track { background: transparent; }
    .pin-scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.2s ease; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .slide-in { animation: slideIn 0.2s ease; }

    input, textarea, select { outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #FFD04E !important; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
  </style>
</head>
<body class="bg-[#111111] text-white min-h-screen overflow-x-hidden">
<div class="max-w-[1440px] mx-auto relative">

  <!-- Hamburger Drawer (mobile only) -->
  <div id="hamburger-drawer" onclick="if(event.target===this)closeHamburger()" class="fixed inset-0 bg-black/75 z-[400] opacity-0 pointer-events-none transition-opacity duration-200 md:hidden" style="backdrop-filter:blur(8px)">
    <div id="hamburger-box" class="absolute top-0 left-0 h-full w-64 bg-[#1a1a1a] border-r border-white/[0.07] p-6 flex flex-col gap-2 -translate-x-full transition-transform duration-300">
      <div class="font-bebas text-[#FFD04E] text-2xl tracking-wider mb-4">STUTime</div>
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[#888] hover:text-white hover:bg-white/[0.05] transition-all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="noto.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[#888] hover:text-white hover:bg-white/[0.05] transition-all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
        Noto
      </a>
      <a href="task.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold bg-[#FFD04E]/10 border border-[#FFD04E]/30 text-[#FFD04E] transition-all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9,11 12,14 22,4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Task
      </a>
      <a href="foctime.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[#888] hover:text-white hover:bg-white/[0.05] transition-all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        FocTime!
      </a>
      <a href="calendar.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-[#888] hover:text-white hover:bg-white/[0.05] transition-all">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendar
      </a>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="nav-blur sticky top-0 z-50 flex items-center px-4 md:px-10 py-3 md:py-[18px] border-b border-white/[0.07] bg-[#111111]/90">
    <!-- Mobile: hamburger -->
    <button onclick="openHamburger()" class="md:hidden w-9 h-9 border border-white/[0.07] rounded-xl flex items-center justify-center text-[#888] hover:text-[#FFD04E] hover:border-[#FFD04E]/40 transition-all flex-shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <!-- Desktop: logo -->
    <div class="hidden md:flex font-bebas w-10 h-10 rounded-full bg-[#FFD04E] text-[#111111] items-center justify-center text-lg flex-shrink-0">D</div>
    <!-- Mobile: judul tengah -->
    <div class="md:hidden flex-1 text-center font-bebas text-[#FFD04E] text-xl tracking-wider">Task</div>
    <!-- Desktop: nav pill -->
    <div class="hidden md:flex gap-1 bg-[#222222] rounded-full p-[5px] mx-auto border border-white/[0.07]">
      <a href="dashboard.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Dashboard</a>
      <a href="noto.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Noto</a>
      <a href="task.html" class="px-5 py-2 rounded-full text-sm font-bold bg-[#FFD04E] text-[#111111]">Task</a>
      <a href="foctime.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">FocTime!</a>
      <a href="calendar.html" class="px-5 py-2 rounded-full text-sm font-medium text-[#888] hover:text-white transition-colors">Calendar</a>
    </div>
    <!-- Mobile: motivate -->
    <div class="md:hidden flex items-center">
      <button onclick="openMotivate()" class="border border-[#FFD04E] text-[#FFD04E] px-3 py-2 rounded-full text-xs font-semibold hover:bg-[#FFD04E] hover:text-[#111111] transition-all">Motive</button>
    </div>
    <!-- Desktop: motivate -->
    <button onclick="openMotivate()" class="hidden md:block border border-[#FFD04E] text-[#FFD04E] px-5 py-[9px] rounded-full text-sm font-semibold hover:bg-[#FFD04E] hover:text-[#111111] transition-all">Motivate</button>
  </nav>

  <!-- Pin task bar — scrollable tanpa batas -->
  <div id="pinned-bar" class="hidden border-b border-white/[0.07] bg-[#111111]/95 px-6 py-3">
    <div class="flex items-center gap-3 min-w-0">
      <div class="flex items-center gap-1.5 flex-shrink-0">
        <svg width="12" height="12" viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22" stroke="#FFD04E" stroke-width="2"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z" fill="#FFD04E" stroke="none"/></svg>
        <span class="text-xs font-bold text-[#FFD04E] uppercase tracking-wider">Pinned</span>
      </div>
      <div class="w-px h-4 bg-white/10 flex-shrink-0"></div>
      <!-- overflow-x-auto + flex-nowrap supaya bisa scroll ke kanan tanpa batas -->
      <div id="pinned-list" class="pin-scroll flex items-center gap-2 overflow-x-auto flex-nowrap pb-0.5 min-w-0 flex-1"></div>
    </div>
  </div>

  <!-- Page Layout -->
  <div class="grid grid-cols-1 md:grid-cols-[380px_1fr]" style="min-height: calc(100vh - 77px);">

    <!-- Sidebar kiri -->
    <aside class="flex border-r border-white/[0.07] bg-[#1a1a1a] flex-col" id="task-sidebar" style="height: calc(100vh - 77px);">
      <div class="p-5 border-b border-white/[0.07] flex items-center justify-between flex-shrink-0">
        <div>
          <div class="font-bebas text-[#FFD04E] text-xl tracking-wider">Jadwal</div>
          <div class="text-xs text-[#555] mt-0.5" id="task-count">0 jadwal</div>
        </div>
        <button onclick="openAddModal()"
          class="flex items-center gap-2 px-4 py-2 bg-[#FFD04E] text-[#111111] rounded-xl text-sm font-bold hover:bg-[#ffe066] transition-all">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Tambah
        </button>
      </div>
      <div class="task-scroll overflow-y-auto flex-1 p-5" id="task-list-container"></div>
    </aside>

    <!-- Content kanan -->
    <main class="hidden md:flex flex-col bg-[#111111] flex-1" id="task-detail-panel" style="height: calc(100vh - 77px);">
      <div class="md:hidden flex items-center gap-3 px-4 py-3 border-b border-white/[0.07] flex-shrink-0">
        <button onclick="backToList()" class="flex items-center gap-2 text-sm text-[#888] hover:text-[#FFD04E] transition-colors">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
          Kembali
        </button>
      </div>
      <div class="flex-1 overflow-y-auto task-scroll p-6" id="detail-content"></div>
    </main>
  </div>

  <!-- Modal tambah / edit — TANPA input prioritas -->
  <div id="task-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="bg-[#1a1a1a] border border-white/[0.07] rounded-2xl p-8 w-full max-w-lg mx-4">
      <div class="flex items-center justify-between mb-6">
        <div class="font-bebas text-[#FFD04E] text-2xl tracking-wider" id="modal-title">Tambah Jadwal</div>
        <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-lg bg-[#222] text-[#888] hover:text-white transition-colors">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="flex flex-col gap-4">
        <!-- Judul -->
        <div>
          <label class="text-xs font-bold text-[#555] uppercase tracking-wider block mb-1.5">Judul Task <span class="text-red-400">*</span></label>
          <input id="form-title" type="text" placeholder="Contoh: Belajar Tailwind CSS"
            class="w-full bg-[#222] border border-white/[0.07] rounded-xl px-4 py-3 text-sm text-white placeholder-[#444] transition-colors" />
        </div>

        <!-- Deskripsi -->
        <div>
          <label class="text-xs font-bold text-[#555] uppercase tracking-wider block mb-1.5">Deskripsi</label>
          <textarea id="form-desc" rows="3" placeholder="Deskripsi singkat tentang task ini..."
            class="w-full bg-[#222] border border-white/[0.07] rounded-xl px-4 py-3 text-sm text-white placeholder-[#444] transition-colors resize-none"></textarea>
        </div>

        <!-- Tanggal dan Waktu -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs font-bold text-[#555] uppercase tracking-wider block mb-1.5">Tanggal <span class="text-red-400">*</span></label>
            <input id="form-date" type="date"
              class="w-full bg-[#222] border border-white/[0.07] rounded-xl px-4 py-3 text-sm text-white transition-colors" />
          </div>
          <div>
            <label class="text-xs font-bold text-[#555] uppercase tracking-wider block mb-1.5">Waktu <span class="text-red-400">*</span></label>
            <input id="form-time" type="time"
              class="w-full bg-[#222] border border-white/[0.07] rounded-xl px-4 py-3 text-sm text-white transition-colors" />
          </div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mt-2">
          <button onclick="closeModal()"
            class="flex-1 py-3 rounded-xl border border-white/[0.07] text-[#888] text-sm font-semibold hover:border-white/20 hover:text-white transition-all">
            Batal
          </button>
          <button onclick="submitTask()"
            class="flex-1 py-3 rounded-xl bg-[#FFD04E] text-[#111111] text-sm font-bold hover:bg-[#ffe066] transition-all">
            Simpan
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Motivate Modal -->
  <div id="motivate-modal" onclick="closeMotivate(event)" class="fixed inset-0 bg-black/75 flex items-center justify-center z-[200] opacity-0 pointer-events-none transition-opacity duration-200" style="backdrop-filter:blur(8px)">
    <div id="motivate-box" class="bg-[#1a1a1a] border border-white/[0.07] rounded-2xl p-10 max-w-[440px] w-[90%] text-center scale-95 transition-transform duration-200">
      <div class="text-5xl mb-4" id="motivate-emoji">💪</div>
      <div class="text-lg leading-relaxed text-[#ddd] font-medium mb-2" id="motivate-quote"></div>
      <div class="text-sm text-[#888] mb-7" id="motivate-author"></div>
      <button onclick="closeMotivate()" class="bg-[#FFD04E] text-[#111111] px-8 py-3 rounded-xl font-bold text-sm">Let's Go! 🚀</button>
    </div>
  </div>

</div>
  <script>
    function showDetail() {
      if (window.innerWidth < 768) {
        document.getElementById('task-sidebar').style.display = 'none';
        const panel = document.getElementById('task-detail-panel');
        panel.style.display = 'flex';
        panel.style.flexDirection = 'column';
      }
    }
    function backToList() {
      document.getElementById('task-detail-panel').style.display = '';
      document.getElementById('task-sidebar').style.display = '';
    }
    function openHamburger() {
      const d = document.getElementById('hamburger-drawer');
      const b = document.getElementById('hamburger-box');
      d.classList.remove('opacity-0','pointer-events-none');
      d.classList.add('opacity-100');
      b.classList.remove('-translate-x-full');
      b.classList.add('translate-x-0');
    }
    function closeHamburger() {
      const d = document.getElementById('hamburger-drawer');
      const b = document.getElementById('hamburger-box');
      d.classList.add('opacity-0','pointer-events-none');
      d.classList.remove('opacity-100');
      b.classList.add('-translate-x-full');
      b.classList.remove('translate-x-0');
    }
  </script>
  <script src="../src/js/task.js"></script>
</body>
</html>
